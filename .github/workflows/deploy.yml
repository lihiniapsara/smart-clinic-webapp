name: Deploy Webapp to GCP

on:
  push:
    branches: [ main ]
  workflow_dispatch:       # manual trigger from GitHub Actions tab

jobs:
  # ─────────────────────────────────────────────
  # 1. Build & test the Next.js app
  # ─────────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          NEXT_PUBLIC_API_GATEWAY_URL: ${{ secrets.NEXT_PUBLIC_API_GATEWAY_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            public/
            package.json
            package-lock.json
          retention-days: 1

  # ─────────────────────────────────────────────
  # 2. Deploy to GCP VM via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: build             # only if build passes

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_WEBAPP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            echo "=== [1/5] Check Node.js ==="
            if ! command -v node &>/dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            node -v && npm -v

            echo "=== [2/5] Check PM2 ==="
            if ! command -v pm2 &>/dev/null; then
              sudo npm install -g pm2
            fi

            echo "=== [3/5] Pull latest webapp code ==="
            WEBAPP_DIR="$HOME/Smart_Clinic/webapp/webapp"

            if [ ! -d "$HOME/Smart_Clinic/.git" ]; then
              git clone --recurse-submodules \
                https://github.com/lihiniapsara/Smart_Clinic.git \
                "$HOME/Smart_Clinic"
            else
              git -C "$HOME/Smart_Clinic" pull --rebase origin main
              git -C "$HOME/Smart_Clinic" submodule update --init --recursive
            fi

            echo "=== [4/5] Build Next.js webapp ==="
            cd "$WEBAPP_DIR"

            # Write runtime environment
            cat > .env.production << 'EOF'
            NEXT_PUBLIC_API_GATEWAY_URL=${{ secrets.NEXT_PUBLIC_API_GATEWAY_URL }}
            EOF

            npm ci
            npm run build

            echo "=== [5/5] Restart via PM2 ==="
            pm2 delete smart-clinic-webapp 2>/dev/null || true
            pm2 start npm \
              --name smart-clinic-webapp \
              --log "$HOME/Smart_Clinic/platform/logs/webapp.log" \
              -- start
            pm2 save

            # Enable auto-start on VM reboot
            sudo env PATH=$PATH:/usr/bin \
              pm2 startup systemd -u "$USER" --hp "$HOME" \
              > /tmp/pm2-webapp-startup.txt 2>&1 || true
            grep "sudo" /tmp/pm2-webapp-startup.txt | bash || true
            pm2 save

            echo ""
            echo "====================================="
            echo " Webapp deployed successfully!"
            echo " URL: http://${{ secrets.GCP_WEBAPP_VM_IP }}:3000"
            echo "====================================="
            pm2 list
